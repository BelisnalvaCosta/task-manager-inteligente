<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Inteligente</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h1>📋 Task Manager</h1>
                <p>Inteligente</p>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-view="dashboard">
                    📊 Dashboard
                </button>
                <button class="nav-btn" data-view="tasks">
                    ✓ Minhas Tarefas
                </button>
                <button class="nav-btn" data-view="create">
                    ➕ Nova Tarefa
                </button>
            </nav>
            <div class="sync-status">
                <span id="syncIndicator" class="sync-dot">●</span>
                <span id="syncText">Sincronizado</span>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- DASHBOARD VIEW -->
            <section id="dashboard-view" class="view active">
                <header class="page-header">
                    <h2>📊 Dashboard</h2>
                    <div class="header-controls">
                        <button id="syncBtn" class="btn btn-secondary">🔄 Sincronizar</button>
                        <button id="offlineToggle" class="btn btn-secondary">📱 Modo Offline</button>
                    </div>
                </header>

                <div class="dashboard-grid">
                    <!-- KPIs -->
                    <div class="kpi-container">
                        <div class="kpi-card">
                            <div class="kpi-icon">📌</div>
                            <div class="kpi-content">
                                <h3>Total de Tarefas</h3>
                                <p class="kpi-value" id="totalTasks">0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon">✅</div>
                            <div class="kpi-content">
                                <h3>Concluídas</h3>
                                <p class="kpi-value success" id="completedTasks">0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon">⏳</div>
                            <div class="kpi-content">
                                <h3>Pendentes</h3>
                                <p class="kpi-value warning" id="pendingTasks">0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon">⚠️</div>
                            <div class="kpi-content">
                                <h3>Atrasadas</h3>
                                <p class="kpi-value danger" id="overdueTasks">0</p>
                            </div>
                        </div>
                    </div>

                    <!-- CHARTS -->
                    <div class="charts-container">
                        <div class="chart-card">
                            <h3>Status das Tarefas</h3>
                            <canvas id="statusChart"></canvas>
                        </div>
                        <div class="chart-card">
                            <h3>Prioridades</h3>
                            <canvas id="priorityChart"></canvas>
                        </div>
                    </div>

                    <!-- STATISTICS -->
                    <div class="stats-card">
                        <h3>Estatísticas</h3>
                        <div class="stat-item">
                            <span>Taxa de Conclusão:</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="completionRate"></div>
                            </div>
                            <span id="completionPercent">0%</span>
                        </div>
                        <div class="stat-item">
                            <span>Tarefas Críticas (Atrasadas):</span>
                            <span class="stat-value danger" id="criticalCount">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TASKS VIEW -->
            <section id="tasks-view" class="view">
                <header class="page-header">
                    <h2>✓ Minhas Tarefas</h2>
                    <div class="header-controls">
                        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar tarefas...">
                        <select id="statusFilter" class="filter-select">
                            <option value="">Todos os Status</option>
                            <option value="concluido">✅ Concluído</option>
                            <option value="em-andamento">⏳ Em Andamento</option>
                            <option value="atrasado">⚠️ Atrasado</option>
                        </select>
                        <select id="priorityFilter" class="filter-select">
                            <option value="">Todas as Prioridades</option>
                            <option value="alta">🔴 Alta</option>
                            <option value="media">🟡 Média</option>
                            <option value="baixa">🟢 Baixa</option>
                        </select>
                    </div>
                </header>

                <div id="tasksContainer" class="tasks-container">
                    <!-- Tasks will be rendered here -->
                </div>
            </section>

            <!-- CREATE/EDIT TASK VIEW -->
            <section id="create-view" class="view">
                <header class="page-header">
                    <h2>➕ Nova Tarefa</h2>
                </header>

                <div class="form-container">
                    <form id="taskForm" class="task-form">
                        <input type="hidden" id="taskId">

                        <div class="form-group">
                            <label for="taskTitle">Título da Tarefa *</label>
                            <input 
                                type="text" 
                                id="taskTitle" 
                                placeholder="Ex: Corrigir bug de login"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="taskDescription">Descrição</label>
                            <textarea 
                                id="taskDescription" 
                                placeholder="Descreva a tarefa em detalhes..."
                                rows="4"
                            ></textarea>
                            <small id="aiSuggestion" class="ai-suggestion"></small>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskPriority">Prioridade</label>
                                <select id="taskPriority">
                                    <option value="baixa">🟢 Baixa</option>
                                    <option value="media" selected>🟡 Média</option>
                                    <option value="alta">🔴 Alta</option>
                                </select>
                                <button type="button" id="aiPriorityBtn" class="btn-icon" title="Sugerir prioridade com IA">
                                    ✨ Sugerir
                                </button>
                            </div>

                            <div class="form-group">
                                <label for="taskDeadline">Data de Entrega</label>
                                <input type="date" id="taskDeadline">
                            </div>

                            <div class="form-group">
                                <label for="taskResponsible">Responsável</label>
                                <input 
                                    type="text" 
                                    id="taskResponsible" 
                                    placeholder="Seu nome ou email"
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="taskCategory">Categoria</label>
                            <input 
                                type="text" 
                                id="taskCategory" 
                                placeholder="Ex: Backend, Frontend, Design"
                            >
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">💾 Salvar Tarefa</button>
                            <button type="button" id="cancelBtn" class="btn btn-secondary">❌ Cancelar</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- MODALS -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalTaskContent"></div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/storage.js"></script>
    <script src="js/ai-priority.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
